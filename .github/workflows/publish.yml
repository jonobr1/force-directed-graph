name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for OIDC (npm provenance + GitHub attestation)
      contents: write      # Required to create GitHub releases and upload assets
      attestations: write  # Required for actions/attest-build-provenance

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f  # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Ensure npm 11.5.1 or later is installed
      - name: Update npm
        run: npm install -g npm@11.5.1
      - run: npm ci
      - run: npm run build

      - name: Generate SLSA provenance attestation
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            build/fdg.js
            build/fdg.module.js
            build/fdg.umd.js
            build/texture-processor.wasm
            build/texture-processor.wasm.map
            build/texture-processor.wat
            types.d.ts

      - name: Stage provenance bundle for release
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          TAG: ${{ github.ref_name }}
        run: cp "$BUNDLE_PATH" "fdg-${TAG}.intoto.jsonl"

      - name: Upload provenance bundle as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: provenance-bundle-${{ github.ref_name }}
          path: fdg-${{ github.ref_name }}.intoto.jsonl

      - name: Publish to npm with provenance
        run: npm publish --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "Official Stable Release of $TAG" \
            --generate-notes \
            build/fdg.js \
            build/fdg.module.js \
            build/fdg.umd.js \
            build/texture-processor.wasm \
            "fdg-${TAG}.intoto.jsonl"
